<mat-toolbar class="app-toolbar px-4 sm:px-8">
  <a routerLink="/quizzes" class="brand text-lg font-semibold tracking-wide">Quiz Forge</a>

  <div class="ml-auto flex items-center gap-3">
    <a mat-stroked-button routerLink="/quizzes" routerLinkActive="active-link">Quiz Catalog</a>
    <mat-slide-toggle
      [checked]="uiPrefs.isDarkMode()"
      (change)="onThemeChange($event)"
      aria-label="Toggle dark mode"
    >
      Dark mode
    </mat-slide-toggle>
  </div>
</mat-toolbar>

@if (storage.warning()) {
  <div class="storage-warning px-4 py-2 text-sm">
    {{ storage.warning() }}
  </div>
}

<main class="app-content min-h-[calc(100dvh-64px)] px-4 py-6 sm:px-8">
  <router-outlet />
</main>
